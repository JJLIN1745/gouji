<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>够级记牌器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: system-ui, 'PingFang SC', 'Noto Sans', Roboto, sans-serif;
    }
    body {
      background: linear-gradient(155deg, #1a2f1f 0%, #1e3c2f 50%, #0f1f15 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(250, 245, 235, 0.96);
      border-radius: 36px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      padding: 16px 12px 20px;
      border: 1px solid #c9aa64;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      background: #2d5a27;
      border-radius: 50px;
      padding: 10px 16px;
      margin-bottom: 14px;
      box-shadow: inset 0 -4px 0 #1a3616;
      border: 1px solid #e4b95b;
      color: #fbe9b1;
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 3px;
    }

    /* 主布局：四列 */
    .main-layout {
      display: flex;
      gap: 8px;
    }
    /* 三列玩家 */
    .player-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .player-column .remain-card {
      background: radial-gradient(circle at 25% 30%, #fff9ee, #e9d4ae);
      border-radius: 16px;
      padding: 8px 4px 6px;
      text-align: center;
      border: 2px solid #d3a84c;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }
    .player-column .remain-card .name {
      font-weight: 800;
      font-size: 0.85rem;
      color: #3d2b10;
    }
    .player-column .remain-card .num {
      font-size: 2.2rem;
      font-weight: 900;
      color: #1f401a;
      line-height: 1.1;
    }
    .player-column .remain-card .label {
      font-size: 0.6rem;
      color: #6e5a3a;
    }

    /* 快捷按钮竖排 */
    .quick-num-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .quick-btn {
      border: none;
      border-radius: 12px;
      padding: 7px 4px;
      font-weight: bold;
      font-size: 0.7rem;
      cursor: pointer;
      box-shadow: 0 2px 0 #5a4326;
      color: #2d2a1a;
      transition: 0.06s;
      text-align: center;
      width: 100%;
    }
    .quick-btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #3b2a14;
    }
    .col-up .quick-btn { background: linear-gradient(180deg, #f0d89c, #b8863a); }
    .col-up .remain-card { border-color: #c8983a; }
    .col-opposite .quick-btn { background: linear-gradient(180deg, #f8c8a0, #c07040); }
    .col-opposite .remain-card { border-color: #c08040; }
    .col-down .quick-btn { background: linear-gradient(180deg, #c8d8a0, #7a8a40); }
    .col-down .remain-card { border-color: #8a9a40; }

    /* 牌面区（右侧） */
    .card-panel {
      flex: 1.6;
      min-width: 0;
    }
    .section-title {
      font-weight: 800;
      font-size: 0.8rem;
      color: #3b5a2b;
      border-bottom: 2px solid #c7a86b60;
      padding-bottom: 4px;
      margin-bottom: 6px;
      text-align: center;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .card-cell {
      background: radial-gradient(circle at 25% 30%, #fffdf5, #ecd9b4);
      border-radius: 12px;
      padding: 4px 1px 3px;
      text-align: center;
      border: 1px solid #d3a84c;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.06s;
    }
    .card-cell:active {
      transform: scale(0.9);
    }
    .card-cell.full {
      opacity: 0.4;
      pointer-events: none;
    }
    .card-rank {
      font-size: 1.2rem;
      font-weight: 900;
      color: #2c4720;
      line-height: 1;
    }
    .card-sym {
      font-size: 0.6rem;
      color: #8b6d3d;
      margin: 1px 0;
    }
    .card-count {
      background: #2f4d2b;
      color: #f7e9b0;
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 0.65rem;
      font-weight: 700;
      display: inline-block;
    }

    .footer-btns {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }
    .btn {
      border: none;
      border-radius: 28px;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #5a4326;
      background: linear-gradient(180deg, #f8e7c0, #caa461);
      color: #2d2a1a;
      transition: 0.06s;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #3b2a14;
    }
    .btn.green {
      background: linear-gradient(180deg, #6ea861, #2c5526);
      color: #f1ffe5;
      box-shadow: 0 4px 0 #183613;
    }
    .note {
      text-align: center;
      font-size: 0.6rem;
      color: #8b7a5a;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">🃏 够级记牌器</div>

  <div class="main-layout">
    <!-- 上家列 -->
    <div class="player-column col-up">
      <div class="remain-card">
        <div class="name">⬆️ 上家</div>
        <div class="num" id="remainUp">52</div>
        <div class="label">剩余</div>
      </div>
      <div class="quick-num-col">
        <button class="quick-btn" onclick="quickAdd('up',1)">1张</button>
        <button class="quick-btn" onclick="quickAdd('up',2)">2张</button>
        <button class="quick-btn" onclick="quickAdd('up',3)">3张</button>
        <button class="quick-btn" onclick="quickAdd('up',4)">4张</button>
        <button class="quick-btn" onclick="quickAdd('up',5)">5张</button>
        <button class="quick-btn" onclick="quickAdd('up',6)">6张</button>
        <button class="quick-btn" onclick="quickAdd('up',7)">7张</button>
        <button class="quick-btn" onclick="quickAdd('up',8)">8张</button>
        <button class="quick-btn" onclick="quickAdd('up',9)">9张</button>
        <button class="quick-btn" onclick="quickAdd('up',10)">10张</button>
      </div>
    </div>

    <!-- 对家列 -->
    <div class="player-column col-opposite">
      <div class="remain-card">
        <div class="name">↔️ 对家</div>
        <div class="num" id="remainOpposite">52</div>
        <div class="label">剩余</div>
      </div>
      <div class="quick-num-col">
        <button class="quick-btn" onclick="quickAdd('opposite',1)">1张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',2)">2张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',3)">3张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',4)">4张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',5)">5张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',6)">6张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',7)">7张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',8)">8张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',9)">9张</button>
        <button class="quick-btn" onclick="quickAdd('opposite',10)">10张</button>
      </div>
    </div>

    <!-- 下家列 -->
    <div class="player-column col-down">
      <div class="remain-card">
        <div class="name">⬇️ 下家</div>
        <div class="num" id="remainDown">52</div>
        <div class="label">剩余</div>
      </div>
      <div class="quick-num-col">
        <button class="quick-btn" onclick="quickAdd('down',1)">1张</button>
        <button class="quick-btn" onclick="quickAdd('down',2)">2张</button>
        <button class="quick-btn" onclick="quickAdd('down',3)">3张</button>
        <button class="quick-btn" onclick="quickAdd('down',4)">4张</button>
        <button class="quick-btn" onclick="quickAdd('down',5)">5张</button>
        <button class="quick-btn" onclick="quickAdd('down',6)">6张</button>
        <button class="quick-btn" onclick="quickAdd('down',7)">7张</button>
        <button class="quick-btn" onclick="quickAdd('down',8)">8张</button>
        <button class="quick-btn" onclick="quickAdd('down',9)">9张</button>
        <button class="quick-btn" onclick="quickAdd('down',10)">10张</button>
      </div>
    </div>

    <!-- 牌面区 -->
    <div class="card-panel">
      <div class="section-title">🃏 已出牌面</div>
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </div>

  <div class="footer-btns">
    <button class="btn" id="undoBtn">↩️ 撤回</button>
    <button class="btn green" id="resetBtn">🔄 重置</button>
  </div>
  <div class="note">
    📐 点牌面=三家共享计数 | 点数字=扣各家剩余张数 | 每人52张
  </div>
</div>

<script>
(function() {
  const CARD_DEFS = [
    { rank:'3', id:'3', total:6, sym:'♠♥♦♣' },
    { rank:'4', id:'4', total:24, sym:'♠♥♦♣' },
    { rank:'5', id:'5', total:24, sym:'♠♥♦♣' },
    { rank:'6', id:'6', total:24, sym:'♠♥♦♣' },
    { rank:'7', id:'7', total:24, sym:'♠♥♦♣' },
    { rank:'8', id:'8', total:24, sym:'♠♥♦♣' },
    { rank:'9', id:'9', total:24, sym:'♠♥♦♣' },
    { rank:'10', id:'10', total:24, sym:'♠♥♦♣' },
    { rank:'J', id:'J', total:24, sym:'♠♥♦♣' },
    { rank:'Q', id:'Q', total:24, sym:'♠♥♦♣' },
    { rank:'K', id:'K', total:24, sym:'♠♥♦♣' },
    { rank:'A', id:'A', total:24, sym:'♠♥♦♣' },
    { rank:'2', id:'2', total:24, sym:'♠♥♦♣' },
    { rank:'🃏', id:'SJ', total:6, sym:'小王' },
    { rank:'👑', id:'BJ', total:6, sym:'大王' },
    { rank:'🦅', id:'EAGLE', total:6, sym:'鹰牌' }
  ];

  const MAX_PER_PLAYER = 52;
  const GLOBAL_MAX = {};
  CARD_DEFS.forEach(c => GLOBAL_MAX[c.id] = c.total);

  let cardCounts = {};
  let remainCounts = { up: 0, opposite: 0, down: 0 };
  let history = [];

  function init() {
    cardCounts = {};
    CARD_DEFS.forEach(c => cardCounts[c.id] = 0);
    remainCounts = { up: 0, opposite: 0, down: 0 };
    history = [];
  }

  function playerRemain(player) {
    return MAX_PER_PLAYER - (remainCounts[player] || 0);
  }

  function addCard(cardId) {
    if (cardCounts[cardId] >= GLOBAL_MAX[cardId]) {
      if (navigator.vibrate) navigator.vibrate(10);
      return;
    }
    cardCounts[cardId]++;
    history.push({ type: 'card', cardId });
    updateUI();
    save();
  }

  window.quickAdd = function(player, n) {
    const remain = playerRemain(player);
    if (remain < n) {
      if (navigator.vibrate) navigator.vibrate(15);
      return;
    }
    remainCounts[player] += n;
    history.push({ type: 'quick', player, count: n });
    updateUI();
    save();
  };

  function undo() {
    if (!history.length) return;
    const last = history.pop();
    if (last.type === 'card') {
      if (cardCounts[last.cardId] > 0) {
        cardCounts[last.cardId]--;
      }
    } else if (last.type === 'quick') {
      remainCounts[last.player] = Math.max(0, remainCounts[last.player] - last.count);
    }
    updateUI();
    save();
  }

  function resetAll() {
    if (confirm('确定重置所有记录？')) {
      init();
      updateUI();
      save();
    }
  }

  function updateUI() {
    document.getElementById('remainUp').textContent = playerRemain('up');
    document.getElementById('remainOpposite').textContent = playerRemain('opposite');
    document.getElementById('remainDown').textContent = playerRemain('down');

    document.querySelectorAll('.card-cell').forEach(el => {
      const cid = el.getAttribute('data-id');
      const cnt = cardCounts[cid] || 0;
      el.querySelector('.card-count').textContent = `${cnt}/${GLOBAL_MAX[cid]}`;
      el.classList.toggle('full', cnt >= GLOBAL_MAX[cid]);
    });
  }

  function buildGrid() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';
    CARD_DEFS.forEach(c => {
      const div = document.createElement('div');
      div.className = 'card-cell';
      div.setAttribute('data-id', c.id);
      div.innerHTML = `
        <div class="card-rank">${c.rank}</div>
        <div class="card-sym">${c.sym}</div>
        <div class="card-count">0/${c.total}</div>
      `;
      div.addEventListener('click', () => addCard(c.id));
      grid.appendChild(div);
    });
  }

  function save() {
    try {
      localStorage.setItem('gouji_v15', JSON.stringify({
        cardCounts, remainCounts, history: history.slice(-200)
      }));
    } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem('gouji_v15');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.cardCounts) {
          CARD_DEFS.forEach(c => {
            let v = data.cardCounts[c.id] || 0;
            cardCounts[c.id] = Math.max(0, Math.min(v, GLOBAL_MAX[c.id]));
          });
        }
        if (data.remainCounts) remainCounts = { ...remainCounts, ...data.remainCounts };
        if (data.history) history = data.history.filter(h => h && h.type);
      }
    } catch(e) {}
  }

  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('resetBtn').addEventListener('click', resetAll);

  window.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      undo();
    }
  });

  init();
  buildGrid();
  load();
  updateUI();
  window.addEventListener('beforeunload', save);
})();
</script>
</body>
</html>
